  (function(){
    var md = "# 판업(Fanup) 서비스 이용약관\n\n**시행일: 2026년 4월 1일**\n\n---\n\n## 제1조 (목적)\n\n이 약관은 주식회사 틴로봇(이하 \"회사\")이 운영하는 판업(Fanup) 서비스(이하 \"서비스\")의 이용과 관련하여, 회사와 이용자 간의 권리·의무 및 책임 사항, 기타 필요한 사항을 규정함을 목적으로 합니다.\n\n---\n\n## 제2조 (용어의 정의)\n\n이 약관에서 사용하는 용어의 정의는 다음과 같습니다.\n\n1. **\"서비스\"** 란 회사가 제공하는 판업(Fanup) 플랫폼 및 그 부가 서비스 일체를 의미합니다.\n2. **\"이용자\"** 란 이 약관에 동의하고 서비스에 접속하여 이용하는 회원 및 비회원을 말합니다.\n3. **\"회원\"** 이란 서비스에 가입하여 이용자 아이디(ID)를 부여받은 자를 말합니다.\n4. **\"판매자\"** 란 회사의 별도 심사 및 등록 절차를 거쳐 서비스 내에서 상품을 등록하고 판매하는 회원을 말합니다.\n5. **\"구매자\"** 란 서비스 내에서 상품을 구매하거나 크리에이터에게 선물을 보내는 회원을 말합니다.\n6. **\"크리에이터\"** 란 판업 서비스에 등록된 VTuber, 스트리머, 콘텐츠 창작자 등 팬 선물을 받을 수 있는 콘텐츠 창작자를 말합니다.\n7. **\"상품\"** 이란 판매자가 서비스 내에 등록한 굿즈(실물 상품), 디지털 상품, 크리에이터 연관 콘텐츠 등 일체를 말합니다.\n8. **\"치즈(Cheez)\"** 란 서비스 내에서 사용 가능한 가상 포인트로서, 현금 결제 또는 이벤트·프로모션을 통해 적립되며 서비스 내 결제에 사용됩니다.\n9. **\"선물\"** 이란 구매자가 특정 크리에이터를 지정하여 상품을 구매·전달하는 행위 또는 그 상품을 말합니다.\n10. **\"콘텐츠\"** 란 회원이 서비스 내에 게시한 글, 이미지, 동영상, 링크 등 모든 정보를 말합니다.\n\n이 약관에서 정의되지 않은 용어는 관계 법령 및 서비스별 운영정책에서 정하는 바에 따릅니다.\n\n---\n\n## 제3조 (약관의 효력 및 변경)\n\n1. 이 약관은 서비스를 이용하고자 하는 모든 이용자에 대하여 그 효력을 발생합니다.\n2. 회사는 「약관의 규제에 관한 법률」, 「전자상거래 등에서의 소비자보호에 관한 법률」, 「정보통신망 이용촉진 및 정보보호 등에 관한 법률」 등 관련 법령을 위반하지 않는 범위에서 이 약관을 변경할 수 있습니다.\n3. 회사가 약관을 개정할 경우에는 적용일자 및 개정 사유를 명시하여 현행 약관과 함께 서비스 초기화면 또는 공지사항에 그 적용일자 7일 전부터 공지합니다. 다만, 이용자에게 불리한 변경의 경우에는 30일 전부터 공지합니다.\n4. 회원이 개정 약관의 적용에 동의하지 않는 경우, 회원 탈퇴를 통해 서비스 이용계약을 해지할 수 있습니다. 공지 기간 내에 이의를 제기하지 않은 경우 변경된 약관에 동의한 것으로 간주합니다.\n\n---\n\n## 제4조 (약관 외 준칙)\n\n이 약관에서 정하지 않은 사항과 이 약관의 해석에 관하여는 「전자상거래 등에서의 소비자보호에 관한 법률」, 「약관의 규제에 관한 법률」, 「정보통신망 이용촉진 및 정보보호 등에 관한 법률」, 「개인정보 보호법」 및 관계 법령과 회사가 별도로 정한 운영정책에 따릅니다.\n\n---\n\n## 제5조 (이용계약의 체결)\n\n1. 이용계약은 이용자가 서비스 가입 신청 화면에서 이 약관의 내용에 동의한 후 가입을 신청하면 회사가 이를 승낙함으로써 체결됩니다.\n2. 회사는 다음 각 호에 해당하는 신청에 대하여는 승낙을 거부하거나 사후에 이용계약을 해지할 수 있습니다.\n   1. 실명이 아닌 명의 또는 타인의 명의를 이용한 경우\n   2. 허위 정보를 기재하거나 회사가 제시하는 내용을 기재하지 않은 경우\n   3. 만 14세 미만인 경우\n   4. 이전에 이용약관 위반 등의 사유로 서비스 이용이 정지 또는 해지된 회원이 재가입을 신청하는 경우\n   5. 기타 이용 신청 요건이 미비한 경우\n3. 이용계약은 회사의 승낙이 이용자에게 도달한 시점에 성립합니다.\n\n---\n\n## 제6조 (회원 가입 연령 제한)\n\n1. 서비스는 만 14세 이상인 자만 가입할 수 있습니다.\n2. 만 14세 미만의 아동이 가입 신청을 한 경우, 회사는 해당 신청을 거부하거나 가입 후 이를 발견한 경우 해당 계정을 즉시 해지할 수 있습니다.\n\n---\n\n## 제7조 (회원 정보의 변경)\n\n1. 회원은 서비스 내 개인정보 설정 화면에서 언제든지 본인의 개인정보를 수정할 수 있습니다.\n2. 가입 신청 시 기재한 사항이 변경된 경우 회원은 온라인으로 정보를 수정하거나 고객센터(hello@fanup.im)를 통해 변경해야 합니다.\n3. 변경사항을 회사에 알리지 않아 발생한 불이익에 대한 책임은 회원에게 있습니다.\n\n---\n\n## 제8조 (회원 탈퇴 및 이용 자격 제한)\n\n1. 회원은 서비스 내 탈퇴 기능 또는 고객센터를 통해 언제든지 이용계약 해지(회원 탈퇴)를 신청할 수 있으며, 회사는 법령에서 정하는 경우를 제외하고 즉시 이를 처리합니다.\n2. 탈퇴 시 보유 중인 치즈(Cheez) 포인트, 구매 내역 등 서비스 이용과 관련된 데이터는 관련 법령이 정하는 보존 기간이 경과한 후 삭제됩니다.\n3. 회사는 회원이 다음 각 호에 해당하는 경우 사전 통지 없이 이용을 제한하거나 계약을 해지할 수 있습니다.\n   1. 타인의 정보 도용 또는 허위 정보 등록\n   2. 이 약관 또는 운영정책 위반\n   3. 서비스 내 불법 행위 또는 타인의 권리 침해\n   4. 결제 수단의 부정 사용 또는 사기 행위\n   5. 기타 회사가 합리적인 이유로 이용 제한이 필요하다고 판단하는 경우\n\n---\n\n## 제9조 (서비스의 내용)\n\n회사는 다음과 같은 서비스를 제공합니다.\n\n1. **크리에이터 선물 커머스**: 구매자가 크리에이터를 선택하여 상품을 구매하고 선물하는 기능\n2. **상품 등록 및 판매**: 판매자가 굿즈·디지털 상품 등을 등록하고 판매하는 기능\n3. **크리에이터 랭킹**: 선물 수신량, 팬 수 등을 기반으로 한 크리에이터 인기 순위 제공\n4. **팬 프로필**: 회원의 팬 활동 내역, 선물 내역, 팔로잉 크리에이터 등을 표시하는 프로필 기능\n5. **채팅 기능**: 크리에이터와 팬 간의 커뮤니케이션 기능\n6. **치즈(Cheez) 포인트 서비스**: 서비스 내 결제에 사용되는 가상 포인트 충전·사용 기능\n7. **기타 회사가 추가로 개발하거나 제휴를 통해 회원에게 제공하는 일체의 서비스**\n\n---\n\n## 제10조 (서비스의 변경 및 중단)\n\n1. 회사는 서비스의 내용, 운영 정책 등을 변경할 필요가 있는 경우 변경 사유 및 내용을 사전에 공지합니다.\n2. 회사는 다음 각 호의 경우 서비스의 전부 또는 일부를 제한하거나 중단할 수 있습니다.\n   1. 시스템 정기 점검, 교체 및 고장, 통신 두절 등 운영상 상당한 이유가 있는 경우\n   2. 천재지변, 국가비상사태 등 불가항력적 사유가 있는 경우\n   3. 전기통신사업법에 규정된 기간통신사업자가 서비스를 중단하는 경우\n3. 서비스 중단의 경우 회사는 사전에 공지하며, 불가피한 경우 사후 공지할 수 있습니다.\n4. 회사는 무료 서비스 중단으로 인한 손해에 대하여 책임을 지지 않습니다. 단, 회사의 고의 또는 중대한 과실에 의한 경우는 제외합니다.\n\n---\n\n## 제11조 (판매자 자격 및 의무)\n\n1. **판매자 등록**: 서비스 내에서 상품을 판매하고자 하는 회원은 회사가 정한 별도의 판매자 등록 절차를 거쳐야 하며, 회사의 심사를 통과한 경우에 한해 판매 자격이 부여됩니다.\n2. **상품 정보 정확성**: 판매자는 상품의 명칭, 가격, 상세 설명, 배송 방법, 배송 예정일, 재고 현황 등 상품 정보를 정확하고 사실에 근거하여 등록해야 합니다. 허위 또는 과장된 상품 정보 등록은 금지됩니다.\n3. **배송 의무**: 판매자는 구매자의 주문이 확정된 후 상품 정보에 명시된 기간 내에 상품을 발송해야 합니다. 배송 지연이 예상되는 경우 구매자에게 즉시 통보해야 합니다.\n4. **환불 및 반품 이행**: 판매자는 「전자상거래 등에서의 소비자보호에 관한 법률」에 따른 구매자의 청약 철회권 및 환불 요청을 성실히 이행해야 합니다. 정당한 사유 없이 이를 거부하는 경우 회사는 판매자의 자격을 정지하거나 취소할 수 있습니다.\n5. **법적 준수 의무**: 판매자는 판매 상품과 관련하여 관련 법령(지식재산권법, 식품위생법, 전자상거래법 등)을 준수해야 하며, 법령 위반 상품의 판매로 인해 발생하는 모든 법적 책임은 판매자가 부담합니다.\n6. **크리에이터 연관 상품**: 크리에이터의 이름, 이미지, 캐릭터 등을 활용한 상품을 등록하는 경우, 판매자는 사전에 해당 크리에이터의 동의를 받아야 합니다. 이를 위반하여 발생하는 분쟁의 책임은 판매자에게 있습니다.\n7. **정산 및 수수료**: 판매 대금의 정산 조건 및 회사 수수료는 별도의 판매자 운영정책에서 정하는 바에 따릅니다.\n\n---\n\n## 제12조 (구매자의 권리 및 의무)\n\n1. **청약 철회**: 구매자는 상품 수령일로부터 7일 이내에 청약 철회를 신청할 수 있습니다. 단, 다음 각 호의 경우에는 청약 철회가 제한될 수 있습니다.\n   1. 디지털 콘텐츠 등 복제·전송이 용이한 상품으로서 이미 사용 또는 다운로드된 경우\n   2. 상품의 훼손 또는 분실이 있는 경우\n   3. 포장을 개봉하여 상품 가치가 현저히 감소한 경우\n   4. 그 밖에 「전자상거래 등에서의 소비자보호에 관한 법률」이 정한 청약 철회 제한 사유에 해당하는 경우\n2. **주문 정보 정확성**: 구매자는 배송지 주소, 수취인 정보 등 주문 정보를 정확하게 기재해야 하며, 잘못된 정보 입력으로 인한 배송 오류의 책임은 구매자에게 있습니다.\n3. **대금 지급 의무**: 구매자는 구매 확정 시 해당 상품의 금액을 정해진 결제 수단으로 지급해야 합니다.\n\n---\n\n## 제13조 (유료 서비스 및 결제)\n\n1. **유료 서비스**: 서비스 내 일부 기능(선물 구매, 치즈 충전 등)은 유료로 제공될 수 있으며, 회사는 유료 서비스의 내용, 가격 등을 서비스 화면에 표시합니다.\n2. **결제 수단**: 구매자는 신용카드, 간편결제, 계좌이체 등 회사가 지정하는 결제 수단으로 대금을 결제할 수 있습니다.\n3. **결제 취소 및 환불**: 결제 취소 및 환불은 결제 수단별 규정 및 관련 법령에 따릅니다. 구체적인 환불 정책은 서비스 내 별도 환불정책에서 정하는 바에 따릅니다.\n4. **미성년자 결제**: 만 14세 이상 만 19세 미만의 미성년 회원이 결제할 경우 법정대리인의 동의가 필요하며, 동의 없이 결제한 경우 법정대리인이 취소할 수 있습니다.\n\n---\n\n## 제14조 (치즈(Cheez) 포인트)\n\n1. **취득 방법**: 치즈는 현금 결제 또는 회사가 운영하는 이벤트·프로모션을 통해 취득할 수 있습니다.\n2. **사용 범위**: 치즈는 서비스 내 상품 구매, 선물 발송 등 결제 수단으로 사용할 수 있으며, 현금 환급은 원칙적으로 불가합니다. 단, 유료 결제를 통해 취득한 치즈는 관련 법령에 따라 환급이 가능할 수 있습니다.\n3. **유효기간**: 치즈의 유효기간은 취득일로부터 회사가 별도로 정하는 기간으로 하며, 유효기간이 경과한 치즈는 자동 소멸됩니다.\n4. **소멸**: 이용계약 해지 시 잔여 치즈는 관련 법령이 정하는 바에 따라 처리됩니다. 환급 요건을 충족하는 경우 회사는 환급 절차를 안내합니다.\n5. **이용 제한**: 치즈는 타인에게 양도, 판매, 담보 제공이 불가합니다.\n6. **그룹사 연동**: 치즈 포인트는 그룹사 서비스인 Cheez(AI 인터랙티브 스토리 플랫폼)와 상호 연동될 수 있으며, 구체적인 연동 조건은 별도 공지합니다.\n\n---\n\n## 제15조 (회원의 의무)\n\n1. 회원은 다음 각 호의 행위를 하여서는 안 됩니다.\n   1. 가입 신청 또는 정보 변경 시 허위 내용 등록\n   2. 다른 회원의 개인정보 무단 수집·이용·제공\n   3. 타인의 명예를 손상시키거나 불이익을 주는 행위\n   4. 회사의 서비스 운영을 방해하는 행위(해킹, 과부하 유발 등)\n   5. 회사의 사전 서면 동의 없이 서비스를 이용한 영리 활동(무단 크롤링, 스크래핑 등 포함)\n   6. 음란, 폭력적, 혐오스러운 콘텐츠 게시\n   7. 지식재산권(저작권, 상표권 등) 침해\n   8. 관련 법령 또는 이 약관에서 금지하는 행위\n2. 회원은 서비스 내 콘텐츠 게시 및 행동에 대한 모든 법적 책임을 부담합니다.\n\n---\n\n## 제16조 (정보의 제공 및 광고)\n\n1. 회사는 서비스 운영과 관련하여 회원에게 이용에 필요한 각종 정보를 서비스 화면에 게시하거나 이메일, 앱 푸시 알림 등의 방법으로 제공할 수 있습니다.\n2. 회사는 서비스 화면, 이메일, 앱 푸시 알림 등을 통해 광고를 게재할 수 있으며, 회원은 광고 수신을 원하지 않는 경우 관련 수신 설정을 변경할 수 있습니다.\n3. 회사는 회원이 서비스를 통해 제3자와 거래를 하는 경우, 그 거래에 관하여 책임을 지지 않습니다.\n\n---\n\n## 제17조 (콘텐츠 및 게시물 관리)\n\n1. 회원이 서비스 내에 게시한 콘텐츠의 저작권은 해당 회원에게 귀속됩니다.\n2. 회원은 서비스 내 콘텐츠 게시를 통해 회사에게 해당 콘텐츠를 서비스 운영, 홍보, 개선 목적으로 사용할 수 있는 비독점적, 무상의 라이선스를 부여합니다.\n3. 회사는 다음 각 호에 해당하는 콘텐츠를 사전 통지 없이 삭제하거나 게시를 제한할 수 있습니다.\n   1. 타인의 권리를 침해하는 콘텐츠\n   2. 음란, 폭력, 혐오 등 공서양속에 반하는 콘텐츠\n   3. 허위 정보 또는 사기 관련 콘텐츠\n   4. 관련 법령을 위반하는 콘텐츠\n4. 회원이 서비스 탈퇴 또는 자격 상실 시, 해당 회원이 게시한 콘텐츠는 관련 법령에 따라 삭제되거나 일정 기간 보관될 수 있습니다.\n\n---\n\n## 제18조 (회사의 면책)\n\n1. 회사는 천재지변, 전쟁, 기간통신사업자의 서비스 중단 등 불가항력으로 인한 서비스 제공 불능 시 책임이 면제됩니다.\n2. 회사는 회원의 귀책 사유로 인한 서비스 이용 장애에 대하여 책임을 지지 않습니다.\n3. 회사는 회원이 서비스를 통해 게시 또는 전달한 정보, 자료, 사실의 신뢰도 및 정확성 등 내용에 관하여 책임을 지지 않습니다.\n4. 회사는 판매자와 구매자 간의 상품 거래에서 직접적인 당사자가 아닌 플랫폼 운영자로서, 판매자의 상품 정보 오류, 배송 지연, 미배송 등에 관한 직접 책임은 판매자에게 있습니다. 다만, 회사는 분쟁 해결을 위한 중재 역할을 수행할 수 있습니다.\n5. 회사는 무료로 제공하는 서비스의 이용과 관련하여 발생한 손해에 대하여 책임을 지지 않습니다. 단, 회사의 고의 또는 중대한 과실이 있는 경우는 제외합니다.\n\n---\n\n## 제19조 (손해배상)\n\n1. 회사는 서비스의 결함 등으로 인하여 유료 서비스의 정상적인 이용이 불가능하여 이용자에게 손해가 발생한 경우, 관련 법령이 정하는 범위 내에서 실제 손해를 배상합니다.\n2. 회원이 이 약관을 위반하거나 불법 행위를 하여 회사에 손해를 끼친 경우, 해당 회원은 회사에 발생한 손해를 배상해야 합니다.\n3. 회사의 서비스로 인한 손해배상 청구는 손해 발생 사실을 안 날로부터 6개월 이내에 제기해야 합니다.\n\n---\n\n## 제20조 (분쟁의 해결)\n\n1. 서비스 이용과 관련하여 회사와 이용자 간에 분쟁이 발생한 경우, 양 당사자는 상호 협의하여 분쟁을 해결하도록 노력합니다.\n2. 협의가 이루어지지 않을 경우, 「소비자기본법」에 따른 한국소비자원 또는 소비자분쟁조정위원회에 조정을 신청할 수 있습니다.\n3. 소송이 제기되는 경우 관할 법원은 민사소송법에 따르며, 준거법은 대한민국 법률로 합니다.\n\n---\n\n## 제21조 (운영정책 및 기타)\n\n1. 이 약관 외에 서비스의 세부적인 운영 기준은 회사가 별도로 정하는 **운영정책** 및 **환불정책**에 따릅니다.\n2. 운영정책 및 환불정책은 서비스 내 고객센터 또는 공지사항 페이지에서 확인할 수 있으며, 이 약관과 상충하는 경우 이 약관이 우선합니다.\n3. 이 약관의 일부 조항이 관련 법령에 의해 무효로 판단되는 경우에도 나머지 조항은 유효하게 존속합니다.\n\n---\n\n## 사업자 정보\n\n| 항목 | 내용 |\n|------|------|\n| 상호 | 주식회사 틴로봇 (Tinrobot Inc.) |\n| 대표이사 | 최상열 |\n| 주소 | 서울시 서초구 강남대로 53길 8, 8층 12-1호 |\n| 사업자등록번호 | 120-87-41039 |\n| 통신판매업신고번호 | 2025-서울서초-3363호 |\n| 전화번호 | 031-8016-5242 |\n| 이메일 | hello@fanup.im |\n\n---\n\n*본 약관은 2026년 4월 1일부터 시행됩니다.*\n";
