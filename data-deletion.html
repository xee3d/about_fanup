확인에 관한 기록 | **6개월** | 「정보통신망법」 제44조의5 |\n\n법정 보관 데이터는 해당 보존 기간이 만료된 즉시 삭제됩니다. 이 데이터는 법령에서 정한 목적 이외에는 사용되지 않습니다.\n\n---\n\n## 제4조 (삭제 처리 기간)\n\n① 탈퇴 신청이 완료된 날로부터 **30일 이내**에 개인정보 삭제 처리가 완료됩니다.\n\n② 30일의 처리 기간 동안에는 탈퇴 철회가 가능합니다. 탈퇴 철회를 원하시는 경우 고객센터(hello@fanup.im)로 연락 바랍니다.\n\n③ 처리 기간 중에도 계정 로그인은 제한될 수 있습니다.\n\n④ 삭제 완료 후에는 해당 계정 및 데이터의 복구가 불가합니다.\n\n---\n\n## 제5조 (판매자 계정 삭제 주의사항)\n\n### 5.1 탈퇴 가능 조건\n\n판매자 회원은 다음 모든 조건이 충족된 경우에 탈퇴가 가능합니다.\n\n1. 미정산 잔액이 없을 것\n2. 진행 중인 주문·배송이 없을 것\n3. 미처리된 환불·반품 요청이 없을 것\n4. 처리 중인 분쟁 사안이 없을 것\n\n### 5.2 정산 완료 절차\n\n① 미정산 잔액이 있는 경우, 탈퇴 전 정산 신청 및 수령 완료 후 탈퇴하여야 합니다.\n\n② 정산 미완료 상태에서 탈퇴 신청 시 회사는 탈퇴 처리를 보류하고 정산 완료를 안내합니다.\n\n③ 탈퇴 이후에도 법정 보관 의무에 따라 거래 기록은 보존됩니다. (제3조 참조)\n\n### 5.3 등록 상품 처리\n\n탈퇴 시 등록된 모든 상품은 서비스에서 삭제되며, 이로 인한 피해에 대해 회사는 책임을 지지 않습니다.\n\n---\n\n## 제6조 (Google/Apple/Kakao 소셜 연동 해제 방법)\n\n소셜 로그인 연동 해제는 판업 앱 탈퇴와 별도로 각 플랫폼에서 직접 처리하여야 합니다.\n\n### 6.1 Google 계정 연동 해제\n\n1. Google 계정 설정 접속 (myaccount.google.com)\n2. 보안 → 타사 앱 및 서비스 접근 권한\n3. Fanup(판업) 선택 → 액세스 권한 취소\n\n또는\n\n- Android: 설정 → 계정 → Google → 앱 권한 → Fanup 제거\n- iOS: 설정 → [본인 이름] → 암호 및 보안 → 앱 로그인 정보 → Fanup 제거\n\n### 6.2 Apple 계정 연동 해제 (Sign in with Apple)\n\n1. iOS 설정 앱 → [본인 이름] → 암호 및 보안\n2. Apple ID를 사용하는 앱 → Fanup 선택\n3. Apple ID 사용 중단 선택\n\n### 6.3 Kakao 계정 연동 해제\n\n1. 카카오 앱 실행 → 더보기(···) → 설정 → 개인정보 보호\n2. 앱 관리 → 판업(Fanup) 선택\n3. 연결 끊기 선택\n\n---\n\n## 제7조 (개인정보 이전/다운로드 방법)\n\n### 7.1 개인정보 열람 및 다운로드 요청\n\n「개인정보 보호법」 제35조에 따라 회원은 자신의 개인정보 열람 및 사본 발급을 요청할 수 있습니다.\n\n① **요청 방법**: 고객센터(hello@fanup.im)에 이메일로 요청\n\n② **요청 시 포함할 내용**:\n   - 회원 이름(닉네임) 및 계정 이메일\n   - 요청 항목 (전체 데이터 또는 특정 항목)\n   - 수신 방법 (이메일 첨부 등)\n\n③ **처리 기간**: 접수일로부터 영업일 기준 10일 이내 제공\n\n### 7.2 제공 데이터 형식\n\n개인정보 사본은 CSV, JSON 등 일반적으로 사용 가능한 형식으로 제공됩니다.\n\n### 7.3 개인정보 정정·삭제 요청\n\n탈퇴 외에도 특정 개인정보의 정정 또는 삭제를 요청할 수 있습니다. 고객센터(hello@fanup.im)로 연락하시면 영업일 기준 10일 이내에 처리합니다.\n\n---\n\n## 제8조 (Meta App 데이터 삭제 페이지 안내)\n\n### 8.1 Meta 플랫폼 데이터 삭제\n\nFacebook(Meta)을 통해 판업(Fanup) 서비스에 접근하였거나, Meta 플랫폼과 연동된 데이터의 삭제를 원하시는
