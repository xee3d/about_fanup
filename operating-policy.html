  (function(){
    var md = "# 판업(Fanup) 운영정책\n\n**시행일: 2026년 4월 1일**\n\n주식회사 틴로봇(이하 \"회사\")이 운영하는 판업(Fanup, 이하 \"서비스\")은 건전하고 안전한 팬 커머스 플랫폼 환경을 조성하기 위하여 아래와 같이 운영정책을 수립합니다.\n\n---\n\n## 회사 정보\n\n| 항목 | 내용 |\n|------|------|\n| 상호 | 주식회사 틴로봇 (Tinrobot Inc.) |\n| 대표이사 | 최상열 |\n| 주소 | 서울시 서초구 강남대로 53길 8, 8층 12-1호 |\n| 사업자등록번호 | 120-87-41039 |\n| 통신판매업신고번호 | 2025-서울서초-3363호 |\n| 대표 전화 | 031-8016-5242 |\n| 이메일 | hello@fanup.im |\n\n---\n\n## 제1조 (목적)\n\n본 운영정책은 「정보통신망 이용촉진 및 정보보호 등에 관한 법률」(이하 \"정보통신망법\"), 「전자상거래 등에서의 소비자보호에 관한 법률」(이하 \"전자상거래법\") 및 기타 관계 법령에 따라 판업(Fanup) 서비스를 공정하고 안전하게 운영하기 위한 세부 기준을 정함을 목적으로 합니다.\n\n---\n\n## 제2조 (적용 범위)\n\n본 정책은 판업 서비스를 이용하는 모든 회원(구매자·판매자·크리에이터 포함)에게 적용됩니다. 이용약관과 본 정책이 상충하는 경우 이용약관이 우선합니다.\n\n---\n\n## 제3조 (금지 행위 및 제재 기준)\n\n### 3.1 금지 행위 목록\n\n회원은 다음 각 호에 해당하는 행위를 하여서는 아니 됩니다.\n\n1. **사기 및 허위 상품 등록**\n   - 실제로 존재하지 않는 상품을 등록하거나 허위 정보를 기재하는 행위\n   - 상품의 재질, 수량, 발송 일정 등 주요 사항을 허위로 표시하는 행위\n   - 동일 또는 유사 상품을 반복 등록하여 소비자를 기만하는 행위\n\n2. **크리에이터 사칭**\n   - 공식 등록되지 않은 크리에이터를 사칭하거나 유사한 닉네임·프로필 이미지를 사용하는 행위\n   - 크리에이터의 이름, 로고, 브랜드 자산을 무단으로 도용하는 행위\n\n3. **허위 리뷰 및 평점 조작**\n   - 금전적 대가를 받고 작성하는 허위 리뷰\n   - 타인의 계정을 이용하거나 계정을 다수 생성하여 평점을 의도적으로 조작하는 행위\n\n4. **불법 콘텐츠 게시**\n   - 「청소년 보호법」에서 정한 청소년 유해 매체물에 해당하는 콘텐츠\n   - 저작권, 상표권 등 제3자의 지식재산권을 침해하는 콘텐츠\n   - 개인정보를 무단으로 수집·공개하는 행위\n   - 폭력적·혐오적·음란한 표현이 포함된 게시물\n\n5. **도배 및 스팸**\n   - 동일하거나 유사한 내용의 메시지·게시물을 반복적으로 전송하는 행위\n   - 광고성 정보를 회원의 동의 없이 발송하는 행위\n   - 자동화된 수단(봇, 매크로 등)을 이용한 서비스 이용\n\n6. **기타 금지 행위**\n   - 회사의 사전 서면 동의 없이 서비스를 상업적으로 이용하는 행위\n   - 서비스의 정상적인 운영을 방해하는 행위\n   - 타 회원에게 불쾌감, 공포, 위협을 주는 행위\n   - 관계 법령을 위반하는 모든 행위\n\n### 3.2 제재 단계 및 기준\n\n| 단계 | 조치 내용 | 적용 기준 |\n|------|-----------|-----------|\n| 1단계 | 경고 | 경미한 위반 행위 최초 적발 |\n| 2단계 | 서비스 이용 정지 (7일) | 경고 누적 3회 이상 또는 중대한 위반 행위 |\n| 3단계 | 서비스 이용 정지 (30일) | 2단계 조치 이후 재위반 또는 심각한 위반 행위 |\n| 4단계 | 영구 이용 정지 | 반복적 중대 위반, 사기·불법 행위, 회복 불가능한 피해 야기 |\n\n### 3.3 즉시 영구 이용 정지 사유\n\n다음 각 호에 해당하는 경우 사전 경고 없이 즉시 영구 이용 정지 조치를 취할 수 있습니다.\n\n1. 청소년 성착취물 등 아동·청소년 대상 불법 콘텐츠 게시\n2. 해킹, 시스템 침해 등 서비스 운영 방해 행위\n3. 대규모 사기로 다수의 구매자에게 피해를 입힌 경우\n4. 범죄 수익금 세탁 등 금융 범죄 연루가 확인된 경우\n\n---\n\n## 제4조 (판매자 정책)\n\n### 4.1 판매자 등록 기준\n\n① 판매자로 등록하기 위해서는 다음 요건을 충족하여야 합니다.\n\n1. 만 19세 이상의 성인 또는 적법한 사업자\n2. 본인 명의 계좌 보유 (정산을 위한 실명 인증 필수)\n3. 판매자 신청서 및 필요 서류(사업자등록증 등) 제출\n4. 회사가 정한 판매자 이용약관 동의\n\n② 회사는 신청서 검토 후 7영업일 이내에 판매자 등록 여부를 통보합니다.\n\n③ 다음에 해당하는 경우 판매자 등록이 거부될 수 있습니다.\n\n1. 과거 서비스 이용 정지 이력이 있는 경우\n2. 제출 서류가 허위이거나 부정확한 경우\n3. 회사가 판단하기에 서비스의 건전성을 해칠 우려가 있는 경우\n\n### 4.2 상품 등록 기준\n\n① 판매자는 다음 기준에 따라 상품을 등록하여야 합니다.\n\n1. 상품명, 가격, 재질, 수량, 예상 배송 일정 등 주요 정보를 정확하게 기재할 것\n2. 상품 이미지는 실제 상품과 동일하거나 유사한 것을 사용할 것\n3. 저작권·상표권 등 제3자의 권리를 침해하지 아니할 것\n4. 관계 법령에서 정한 상품 표시 의무를 준수할 것\n\n② 상품 등록 후 회사의 검수 절차를 거치며, 미충족 시 반려될 수 있습니다.\n\n### 4.3 금지 상품 목록\n\n다음 각 호에 해당하는 상품은 등록이 금지됩니다.\n\n1. 「청소년 보호법」상 청소년 유해 물건\n2. 총포·도검·화약류 등 위험 물품\n3. 위조 상품 또는 지식재산권 침해 상품\n4. 의약품·의료기기 (허가 없이 판매 불가한 품목)\n5. 야생동물 등 국제 협약에 의해 거래가 금지된 동물 및 그 부산물\n6. 개인 정보가 포함된 불법 데이터\n7. 현금화 가능한 금융 상품 및 상품권 (회사가 별도 허용한 경우 제외)\n8. 기타 관계 법령에 의해 판매가 금지된 품목\n\n### 4.4 배송 의무\n\n① 판매자는 주문 확인일로부터 상품 설명에 명시된 기간 내에 배송을 완료하여야 합니다.\n\n② 배송 지연이 예상되는 경우, 지연 사유와 예상 일정을 사전에 구매자 및 회사에 통보하여야 합니다.\n\n③ 배송 지연이 반복되거나 고의적인 배송 지연이 확인된 경우, 회사는 해당 판매자에 대한 제재를 가할 수 있습니다.\n\n### 4.5 정산 정책\n\n① 판매 대금은 구매자의 구매 확정일(또는 자동 구매 확정일)로부터 영업일 기준 5일 이내에 정산됩니다.\n\n② 회사는 정산 금액에서 서비스 수수료를 공제한 후 판매자의 등록 계좌로 지급합니다.\n\n③ 환불·반품·교환이 발생한 경우 해당 금액은 정산에서 제외되거나 차감될 수 있습니다.\n\n④ 판매자가 서비스 이용 정지 중인 경우, 정지 기간 동안 정산이 보류될 수 있습니다.\n\n---\n\n## 제5조 (크리에이터 정책)\n\n### 5.1 크리에이터 등록 기준\n\n① 크리에이터로 등록하기 위해서는 다음 요건을 충족하여야 합니다.\n\n1. 유튜브, 트위치, 치지직 등 주요 스트리밍 플랫폼에서 활동 중인 VTuber·스트리머·콘텐츠 크리에이터\n2. 최소 구독자/팔로워 수 등 회사가 별도로 정한 기준 충족\n3. 크리에이터 신청서 및 채널 인증 완료\n4. 이용약관 및 크리에이터 가이드라인 동의\n\n② 회사는 신청서 검토 후 14영업일 이내에 등록 여부를 통보합니다.\n\n### 5.2 크리에이터 활동 의무\n\n① 크리에이터는 다음 의무를 준수하여야 합니다.\n\n1. 허위 사실 유포, 명예훼손 등 타인의 권리를 침해하지 아니할 것\n2. 팬에게 과도한 구매를 유도하는 행위를 하지 아니할 것\n3. 서비스에 등록된 공식 크리에이터 프로필을 최신 상태로 유지할 것\n4. 관련 법령 및 회사 정책을 준수할 것\n\n② 크리에이터가 상기 의무를 위반한 경우, 회사는 크리에이터 등록을 취소하거나 이용을 제한할 수 있습니다.\n\n### 5.3 크리에이터 권리 보호\n\n① 회사는 크리에이터의 브랜드 자산(닉네임, 로고, 슬로건 등)을 서비스 내에서 보호하기 위한 조치를 취합니다.\n\n② 크리에이터를 사칭하거나 브랜드 자산을 무단으로 사용하는 계정은 즉시 제재 조치합니다.\n\n③ 크리에이터는 자신의 프로필 및 연결된 굿즈 상품 관련 정보에 대해 이의를 제기하거나 수정을 요청할 수 있습니다.\n\n---\n\n## 제6조 (치즈(Cheez) 포인트 정책)\n\n### 6.1 치즈 포인트 개요\n\n치즈(Cheez) 포인트는 회사가 서비스 내에서 운영하는 가상의 포인트로, 「전자금융거래법」이 정한 요건에 따라 운용됩니다.\n\n### 6.2 치즈 포인트 획득 방법\n\n회원은 다음 방법으로 치즈 포인트를 획득할 수 있습니다.\n\n1. **유료 구매**: 서비스 내 결제 수단을 이용한 치즈 포인트 직접 구매\n2. **이벤트 지급**: 회사가 주관하는 이벤트·프로모션 참여 보상\n3. **활동 보상**: 리뷰 작성, 출석 체크 등 서비스 내 활동에 따른 지급 (무료 포인트)\n4. **크리에이터 후원 환급**: 회사 정책에 따른 특정 후원 이벤트 참여 보상\n\n### 6.3 치즈 포인트 사용 범위\n\n치즈 포인트는 다음 용도로 사용 가능합니다.\n\n1. 서비스 내 상품 구매\n2. 크리에이터 후원\n3. 기타 회사가 허용하는 서비스 내 기능\n\n### 6.4 치즈 포인트 소멸 조건\n\n① **유료 구매 포인트**: 구매일로부터 5년 이내에 사용하지 않은 포인트는 소멸됩니다.\n\n② **무료(이벤트·활동) 포인트**: 지급일로부터 1년 이내에 사용하지 않은 포인트는 소멸됩니다.\n\n③ 회원 탈퇴 시 잔여 포인트는 원칙적으로 소멸되며, 유료 구매 포인트의 경우 「전자금융거래법」 관련 규정에 따라 환불 신청이 가능합니다.\n\n④ 회원이 법령 또는 이용약관을 위반하여 이용 정지·강제 탈퇴 처리된 경우, 잔여 포인트는 환불되지 않을 수 있습니다.\n\n### 6.5 치즈 포인트 환불\n\n① 유료로 구매한 치즈 포인트의 잔액이 구매 금액의 60% 이상 남아 있거나, 구매 후 1년이 경과하지 않은 경우 환불을 신청할 수 있습니다.\n\n② 환불 신청은 고객센터(hello@fanup.im)를 통해 접수하며, 처리 기간은 영업일 기준 5일 이내입니다.\n\n---\n\n## 제7조 (콘텐츠 관리 정책)\n\n### 7.1 게시물 심사\n\n① 회사는 서비스에 게시되는 콘텐츠(상품 설명, 리뷰, 채팅, 프로필 등)를 모니터링하고, 정책 위반 게시물을 삭제하거나 노출을 제한할 수 있습니다.\n\n② 신규 판매자의 상품 등록 시에는 최초 검수 절차를 거칩니다.\n\n③ 인공지능(AI) 기반의 자동 모니터링 시스템을 운영하며, 필요한 경우 인력에 의한 추가 검토를 실시합니다.\n\n### 7.2 신고 처리\n\n① 회원은 정책 위반 콘텐츠 및 행위를 서비스 내 신고 기능 또는 고객센터(hello@fanup.im)를 통해 신고할 수 있습니다.\n\n② 신고 접수 후 처리 결과는 원칙적으로 영업일 기준 7일 이내에 신고자에게 통보됩니다.\n\n③ 허위 신고 또는 악의적 신고가 반복되는 경우 신고자에 대한 제재 조치가 가해질 수 있습니다.\n\n### 7.3 저작권 침해 신고\n\n저작권 침해 관련 신고는 DMCA 또는 국내 「저작권법」이 정한 절차에 따라 접수·처리됩니다.\n\n---\n\n## 제8조 (이용 제재 절차 및 이의신청)\n\n### 8.1 제재 절차\n\n① 회사는 정책 위반 사실을 확인한 경우 다음 절차에 따라 제재를 진행합니다.\n\n1. 위반 행위 확인 및 증거 수집\n2. 제재 수준 결정\n3. 회원에게 제재 내용 및 사유 통보 (이메일 또는 앱 내 알림)\n4. 이의신청 기간(7일) 안내\n\n### 8.2 이의신청\n\n① 제재 처분을 받은 회원은 통보일로부터 7일 이내에 고객센터(hello@fanup.im)를 통해 이의를 신청할 수 있습니다.\n\n② 이의신청 시 다음 내용을 포함하여야 합니다.\n\n1. 회원 이름(닉네임) 및 계정 이메일\n2. 이의신청 사유 및 근거 자료\n\n③ 회사는 이의신청 접수 후 영업일 기준 14일 이내에 재검토 결과를 통보합니다.\n\n④ 재검토 결과에도 이의가 있는 경우, 회원은 한국소비자원, 전자상거래분쟁조정위원회 등 외부 기관에 분쟁 해결을 신청할 수 있습니다.\n\n---\n\n## 제9조 (미성년자 보호 조치)\n\n① 회사는 「청소년 보호법」 및 「정보통신망법」에 따라 미성년자가 유해한 콘텐츠에 노출되지 않도록 연령 확인 절차를 운영합니다.\n\n② 만 14세 미만의 아동은 원칙적으로 서비스에 가입할 수 없으며, 만 14세 이상 만 19세 미만의 청소년 회원은 법정대리인(부모 등)의 동의를 얻어 가입할 수 있습니다.\n\n③ 청소년 회원의 결제는 법정대리인의 동의를 요구하며, 월 결제 한도가 적용됩니다. (세부 기준은 청소년 보호 정책 참조)\n\n④ 미성년자를 대상으로 하거나 미성년자 보호에 반하는 마케팅 활동은 금지됩니다.\n\n⑤ 청소년보호책임자: 대표이사 최상열 (hello@fanup.im)\n\n---\n\n## 제10조 (정책의 변경)\n\n① 회사는 관계 법령의 변경이나 서비스 운영상의 필요에 의해 본 정책을 변경할 수 있습니다.\n\n② 정책 변경 시에는 시행 7일 전부터 서비스 내 공지사항을 통해 공지하며, 중요한 변경사항의 경우 30일 전부터 공지합니다.\n\n③ 변경된 정책은 공지된 시행일부터 효력이 발생합니다.\n\n---\n\n**시행일: 2026년 4월 1일**\n\n주식회사 틴로봇 (Tinrobot Inc.)\n대표이사 최상열\n";
