<script>
  (function(){
    var md = "# 판업(Fanup) 개인정보처리방침\n\n**시행일: 2026년 4월 1일**\n\n---\n\n주식회사 틴로봇(이하 \"회사\")은 「개인정보 보호법」, 「정보통신망 이용촉진 및 정보보호 등에 관한 법률」 등 관련 법령을 준수하며, 이용자의 개인정보를 안전하게 처리하기 위하여 다음과 같이 개인정보처리방침을 수립·공개합니다.\n\n---\n\n## 제1조 (수집하는 개인정보의 항목 및 수집 방법)\n\n### 1. 수집 항목\n\n#### 가. 회원 가입 및 서비스 이용\n\n| 구분 | 수집 항목 | 수집 목적 |\n|------|----------|----------|\n| 필수 | 이메일 주소, 비밀번호, 닉네임 | 회원 식별 및 서비스 제공 |\n| 선택 | 프로필 이미지, 소개글 | 팬 프로필 서비스 제공 |\n\n#### 나. 구매자(상품 구매 및 선물)\n\n| 구분 | 수집 항목 | 수집 목적 |\n|------|----------|----------|\n| 필수 | 수취인 성명, 배송지 주소, 수취인 연락처 | 주문 배송 처리 |\n| 필수 | 구매·주문 내역, 결제 수단 정보(카드사명, 카드번호 앞 6자리·뒤 4자리) | 결제 처리 및 거래 기록 관리 |\n| 선택 | 교환·반품 배송지 정보 | 환불·반품 처리 |\n\n#### 다. 판매자 등록\n\n| 구분 | 수집 항목 | 수집 목적 |\n|------|----------|----------|\n| 필수 | 상호(또는 성명), 사업자등록번호(또는 주민등록번호 앞·뒷 7자리), 대표자 성명 | 판매자 본인 확인 및 계약 체결 |\n| 필수 | 정산용 계좌 정보(금융기관명, 계좌번호, 예금주) | 판매 대금 정산 |\n| 필수 | 사업장 주소, 전화번호 | 판매자 관리 및 분쟁 처리 |\n| 선택 | 통신판매업신고번호 | 적법 판매 여부 확인 |\n\n#### 라. 크리에이터 등록\n\n| 구분 | 수집 항목 | 수집 목적 |\n|------|----------|----------|\n| 필수 | 활동명(채널명), 플랫폼 링크(YouTube, Twitch 등) | 크리에이터 프로필 등록 및 서비스 제공 |\n| 선택 | 본명, 연락처, 정산용 계좌 정보 | 수익 정산 및 본인 확인 |\n\n#### 마. 자동 수집 정보\n\n서비스 이용 과정에서 아래의 정보가 자동으로 생성·수집될 수 있습니다.\n\n- IP 주소, 쿠키, 기기 정보(기기 식별자, OS, 앱 버전), 브라우저 정보\n- 서비스 이용 기록(접속 로그, 방문 일시, 검색 내역, 조회·클릭 기록)\n- 결제 기록, 선물 발송/수신 기록\n\n### 2. 수집 방법\n\n- 서비스 가입·이용 과정에서 이용자가 직접 입력\n- 자동화된 수집 도구(쿠키, Firebase SDK 등)를 통한 자동 수집\n- 제3자(소셜 로그인 제공 업체)로부터 수집 (이용자 사전 동의 기반)\n\n---\n\n## 제2조 (개인정보의 처리 목적)\n\n회사는 다음의 목적을 위하여 개인정보를 처리합니다. 처리한 개인정보는 다음의 목적 이외의 용도로는 이용되지 않으며, 이용 목적이 변경될 시에는 사전 동의를 구할 것입니다.\n\n1. **서비스 제공**: 크리에이터 선물 커머스 운영, 상품 주문·결제·배송, 크리에이터 랭킹 및 팬 프로필 서비스 제공, 채팅 기능 운영\n2. **회원 관리**: 회원 가입 및 본인 확인, 이용계약 이행, 불량 회원 관리, 고객 문의 응대 및 분쟁 처리\n3. **판매자 관리**: 판매자 심사 및 등록, 상품 정보 관리, 정산 처리, 판매 정책 준수 여부 모니터링\n4. **결제 처리**: 유료 서비스 결제 처리, 치즈(Cheez) 포인트 충전·사용 내역 관리, 환불 처리\n5. **마케팅 및 광고**: 이벤트·프로모션 정보 제공, 맞춤형 광고 및 추천 서비스 제공 (이용자 동의 기반)\n6. **서비스 개선 및 개발**: 서비스 이용 분석, 신규 기능 개발, 서비스 품질 향상\n7. **법적 의무 이행**: 관련 법령에 따른 기록 보존 및 제출\n\n---\n\n## 제3조 (개인정보의 처리 및 보유 기간)\n\n회사는 법령에 따른 개인정보 보유·이용 기간 또는 이용자로부터 동의 받은 개인정보 보유·이용 기간 내에서 개인정보를 처리·보유합니다.\n\n### 1. 회원 정보\n\n| 항목 | 보유 기간 | 근거 |\n|------|----------|------|\n| 회원 기본 정보 | 회원 탈퇴 후 30일 (탈퇴 처리 완료 후 즉시 삭제 원칙, 단 법령 보존 기간 우선) | 개인정보 보호법 |\n| 부정 이용 방지를 위한 최소 정보 | 탈퇴 후 1년 | 서비스 운영 정책 |\n\n### 2. 전자상거래 관련 기록 (전자상거래 등에서의 소비자보호에 관한 법률)\n\n| 항목 | 보유 기간 |\n|------|----------|\n| 계약 또는 청약철회 등에 관한 기록 | **5년** |\n| 대금결제 및 재화 등의 공급에 관한 기록 | **5년** |\n| 소비자의 불만 또는 분쟁처리에 관한 기록 | **3년** |\n| 표시·광고에 관한 기록 | **6개월** |\n\n### 3. 통신 관련 기록\n\n| 항목 | 보유 기간 | 근거 |\n|------|----------|------|\n| 서비스 접속 로그 기록 | **3개월** | 통신비밀보호법 |\n\n### 4. 판매자 정보\n\n| 항목 | 보유 기간 |\n|------|----------|\n| 판매자 계약·정산 관련 기록 | 계약 종료 후 **5년** (전자상거래법) |\n\n---\n\n## 제4조 (개인정보의 제3자 제공)\n\n회사는 이용자의 개인정보를 제2조에서 고지한 목적 범위 내에서만 처리하며, 이용자의 동의, 법률의 특별한 규정 등 「개인정보 보호법」 제17조에 해당하는 경우에만 개인정보를 제3자에게 제공합니다.\n\n### 현재 제3자 제공 현황\n\n| 제공받는 자 | 제공 목적 | 제공 항목 | 보유 및 이용 기간 |\n|-----------|----------|----------|----------------|\n| 결제대행사(PG사) | 결제 처리 및 결제 취소 | 성명, 카드 정보(암호화), 거래 금액, 주문 정보 | 결제 완료 후 5년 (전자상거래법) |\n| 배송업체(택배사) | 상품 배송 | 수취인 성명, 배송지 주소, 수취인 연락처 | 배송 완료 후 3개월 |\n\n> 회사는 필요한 최소한의 정보만을 제3자에게 제공하며, 제3자 제공 현황이 변경되는 경우 사전에 공지하고 동의를 구합니다.\n\n---\n\n## 제5조 (개인정보 처리의 위탁)\n\n회사는 원활한 서비스 제공을 위하여 개인정보 처리를 외부 전문 업체에 위탁하고 있으며, 수탁 업체에 대한 관리·감독을 수행합니다.\n\n### 수탁 업체 목록\n\n| 수탁 업체 | 위탁 업무 내용 | 개인정보 보유 및 이용 기간 |\n|----------|-------------|----------------------|\n| Google LLC (Firebase) | 클라우드 인프라 운영, 인증(Authentication), 데이터베이스(Firestore) 관리, 앱 푸시 알림(FCM) 발송 | 위탁 계약 기간 동안 |\n| Cloudflare, Inc. | CDN 서비스, 파일 스토리지(R2) 운영 | 위탁 계약 기간 동안 |\n| 결제대행사(PG사) | 결제 시스템 운영, 결제 정보 처리 | 결제 완료 후 5년 |\n| 문자·이메일 발송 서비스 업체 | 인증 문자, 서비스 알림 이메일 발송 | 발송 완료 후 즉시 삭제 |\n\n회사는 위탁 계약 체결 시 「개인정보 보호법」 제26조에 따라 개인정보 보호 관련 법규 준수 여부, 개인정보의 안전 관리에 관한 사항을 계약서에 명시하고 이를 감독합니다.\n\n---\n\n## 제6조 (정보주체와 법정대리인의 권리·의무 및 행사 방법)\n\n1. 이용자(정보주체)는 회사에 대해 언제든지 다음 각 호의 권리를 행사할 수 있습니다.\n   1. 개인정보 열람 요구\n   2. 오류 등이 있을 경우 정정 요구\n   3. 삭제 요구\n   4. 처리 정지 요구\n2. 권리 행사는 서비스 내 설정 메뉴 또는 개인정보 보호책임자에게 서면, 이메일로 요청할 수 있으며, 회사는 이에 대해 지체 없이 조치합니다.\n3. 이용자가 개인정보의 오류 등에 대한 정정 또는 삭제를 요구한 경우, 해당 정정 또는 삭제를 완료하기 전에는 해당 개인정보를 이용하거나 제공하지 않습니다.\n4. 만 14세 미만 아동의 경우, 법정대리인이 해당 아동의 개인정보에 관한 권리를 행사할 수 있습니다.\n\n---\n\n## 제7조 (처리하는 개인정보 항목)\n\n회사는 다음의 개인정보 항목을 처리하고 있습니다.\n\n1. **필수 항목**: 이메일 주소, 닉네임, 서비스 이용 기록, 접속 로그, 쿠키, 결제 기록\n2. **선택 항목**: 프로필 이미지, 소개글, 소셜 계정 연동 정보\n3. **자동 수집**: IP 주소, 기기 정보, 앱 버전, OS 정보\n\n---\n\n## 제8조 (개인정보의 파기)\n\n1. 회사는 개인정보 보유 기간의 경과, 처리 목적 달성 등 개인정보가 불필요하게 되었을 때에는 지체 없이 해당 개인정보를 파기합니다.\n2. 이용자로부터 동의 받은 개인정보 보유 기간이 경과하거나 처리 목적이 달성되었음에도 불구하고 다른 법령에 따라 개인정보를 계속 보존하여야 하는 경우에는, 해당 개인정보를 별도의 데이터베이스(DB)로 옮기거나 보관 장소를 달리하여 보존합니다.\n3. **파기 방법**:\n   - 전자적 파일 형태: 복원이 불가능한 방법으로 영구 삭제\n   - 종이 문서: 분쇄기로 분쇄하거나 소각\n\n---\n\n## 제9조 (개인정보의 안전성 확보 조치)\n\n회사는 개인정보의 안전성 확보를 위하여 다음과 같은 조치를 취하고 있습니다.\n\n1. **관리적 조치**: 내부 관리계획 수립·시행, 정기적 직원 교육\n2. **기술적 조치**: 개인정보처리시스템 접근 권한 관리, 개인정보 암호화(전송 구간 TLS, 저장 시 암호화), 보안 프로그램 설치·갱신, 접속 기록 보관 및 위·변조 방지\n3. **물리적 조치**: 전산실, 자료보관실 등의 접근 통제\n\n---\n\n## 제10조 (개인정보 자동 수집 장치의 설치·운영 및 거부)\n\n1. 회사는 이용자에게 개인화된 서비스를 제공하기 위해 쿠키(cookie) 등 자동 수집 장치를 사용합니다.\n2. 쿠키는 웹사이트·앱 운영에 이용되는 서버가 이용자의 기기에 전송하는 소량의 정보이며, 이용자의 기기에 저장됩니다.\n3. 이용자는 기기 설정(웹브라우저의 쿠키 설정, 앱의 알림·추적 설정)을 통해 쿠키 저장을 거부할 수 있습니다. 단, 쿠키 저장을 거부할 경우 일부 서비스 이용이 제한될 수 있습니다.\n\n---\n\n## 제11조 (그룹사 서비스 연동)\n\n1. 회사의 그룹사인 **Cheez(AI 인터랙티브 스토리 플랫폼)**와 일부 서비스(치즈 포인트 연동 등)가 연동될 수 있습니다.\n2. 그룹사 서비스 이용 시 해당 서비스의 개인정보처리방침이 별도로 적용됩니다.\n3. 그룹사 서비스 연동 시에는 이용자에게 별도의 동의를 구합니다.\n\n---\n\n## 제12조 (개인정보 보호책임자)\n\n회사는 개인정보 처리에 관한 업무를 총괄해서 책임지고, 개인정보 처리와 관련한 정보주체의 불만 처리 및 피해 구제를 위하여 아래와 같이 개인정보 보호책임자를 지정하고 있습니다.\n\n| 구분 | 내용 |\n|------|------|\n| 개인정보 보호책임자 | 최상열 (대표이사) |\n| 연락처(이메일) | hello@fanup.im |\n| 연락처(전화) | 031-8016-5242 |\n\n이용자는 서비스를 이용하면서 발생한 모든 개인정보 보호 관련 문의, 불만 처리, 피해 구제 등에 관한 사항을 개인정보 보호책임자에게 문의할 수 있습니다. 회사는 이용자의 문의에 지체 없이 답변 및 처리할 것입니다.\n\n---\n\n## 제13조 (권익침해 구제 방법)\n\n이용자는 개인정보 침해로 인한 구제를 받기 위하여 개인정보분쟁조정위원회, 한국인터넷진흥원 개인정보침해신고센터 등에 분쟁해결이나 상담 등을 신청할 수 있습니다.\n\n| 기관 | 연락처 |\n|------|-------|\n| 개인정보분쟁조정위원회 | (국번없이) 1833-6972 / www.kopico.go.kr |\n| 개인정보침해신고센터 | (국번없이) 118 / privacy.kisa.or.kr |\n| 대검찰청 사이버범죄수사단 | (국번없이) 1301 / www.spo.go.kr |\n| 경찰청 사이버안전국 | (국번없이) 182 / cyberbureau.police.go.kr |\n\n---\n\n## 제14조 (개인정보처리방침의 변경)\n\n1. 이 개인정보처리방침은 2026년 4월 1일부터 적용됩니다.\n2. 법령, 정부 정책 또는 서비스 변경 등으로 인하여 본 방침의 내용 변경이 필요한 경우, 회사는 변경 사항을 시행 7일 전(중요한 권리·의무 사항 변경의 경우 30일 전)에 서비스 공지사항 등을 통해 고지합니다.\n3. 이전 개인정보처리방침은 고객센터(hello@fanup.im)를 통해 확인할 수 있습니다.\n\n---\n\n## 사업자 정보\n\n| 항목 | 내용 |\n|------|------|\n| 상호 | 주식회사 틴로봇 (Tinrobot Inc.) |\n| 대표이사 | 최상열 |\n| 주소 | 서울시 서초구 강남대로 53길 8, 8층 12-1호 |\n| 사업자등록번호 | 120-87-41039 |\n| 통신판매업신고번호 | 2025-서울서초-3363호 |\n| 전화번호 | 031-8016-5242 |\n| 이메일 | hello@fanup.im |\n\n---\n\n*본 개인정보처리방침은 2026년 4월 1일부터 시행됩니다.*\n";
