  (function(){
    var md = "# 판업(Fanup) 청소년 보호 정책\n\n**시행일: 2026년 4월 1일**\n\n주식회사 틴로봇(이하 \"회사\")이 운영하는 판업(Fanup, 이하 \"서비스\")은 「청소년 보호법」, 「정보통신망 이용촉진 및 정보보호 등에 관한 법률」(이하 \"정보통신망법\"), 「개인정보 보호법」 등 관계 법령에 따라 청소년 보호를 위한 다음과 같은 정책을 시행합니다.\n\n---\n\n## 회사 정보\n\n| 항목 | 내용 |\n|------|------|\n| 상호 | 주식회사 틴로봇 (Tinrobot Inc.) |\n| 대표이사 | 최상열 |\n| 주소 | 서울시 서초구 강남대로 53길 8, 8층 12-1호 |\n| 사업자등록번호 | 120-87-41039 |\n| 통신판매업신고번호 | 2025-서울서초-3363호 |\n| 대표 전화 | 031-8016-5242 |\n| 이메일 | hello@fanup.im |\n\n---\n\n## 제1조 (청소년 이용 기준)\n\n### 1.1 이용 가능 연령\n\n① 판업(Fanup) 서비스는 만 14세 이상의 회원에게 제공됩니다.\n\n② **만 14세 미만의 아동**은 서비스에 가입할 수 없습니다. 회사는 만 14세 미만의 아동으로부터 개인정보를 수집하지 않으며, 만 14세 미만으로 확인된 계정은 즉시 이용이 제한됩니다.\n\n③ **만 14세 이상 만 19세 미만의 청소년**은 법정대리인(부모 또는 후견인)의 동의를 받아 서비스를 이용할 수 있습니다.\n\n④ 「청소년 보호법」 제2조에 따른 청소년은 만 19세 미만인 자를 의미하며, 만 19세가 되는 해의 1월 1일을 맞이한 자는 제외합니다.\n\n### 1.2 연령 확인 절차\n\n① 회원 가입 시 생년월일 입력을 통해 연령을 확인합니다.\n\n② 연령 확인이 불분명하거나 허위 정보 입력이 의심되는 경우, 추가 인증(본인 인증 등)을 요구할 수 있습니다.\n\n③ 허위 생년월일 입력 등 부정한 방법으로 가입한 사실이 확인된 경우 해당 계정의 이용이 즉시 제한될 수 있습니다.\n\n---\n\n## 제2조 (법정대리인 동의 절차)\n\n### 2.1 동의 요건\n\n① 만 14세 이상 만 19세 미만의 청소년이 서비스에 가입하거나 일정 금액 이상의 결제를 진행하는 경우, 법정대리인의 동의가 필요합니다.\n\n② 법정대리인은 부모(친권자) 또는 법원이 선임한 후견인을 의미합니다.\n\n### 2.2 동의 방법\n\n① 법정대리인 동의는 다음 방법 중 하나로 진행됩니다.\n\n1. **이메일 동의**: 법정대리인의 이메일 주소로 동의 요청서를 발송하고 동의 확인\n2. **휴대폰 인증**: 법정대리인 명의의 휴대폰을 통한 본인 인증\n\n② 동의 절차:\n```\n청소년 회원 가입 신청\n  → 법정대리인 정보 입력 (이름, 연락처)\n  → 법정대리인에게 동의 요청 발송\n  → 법정대리인 동의 완료\n  → 청소년 계정 활성화\n```\n\n### 2.3 동의 철회\n\n① 법정대리인은 언제든지 동의를 철회할 수 있습니다.\n\n② 동의 철회 시 청소년 회원의 계정이 비활성화되며, 개인정보 삭제를 함께 요청할 수 있습니다.\n\n③ 동의 철회 및 계정 비활성화 요청은 고객센터(hello@fanup.im)를 통해 가능합니다.\n\n---\n\n## 제3조 (청소년 보호 조치)\n\n### 3.1 결제 한도\n\n① 청소년 회원의 서비스 내 결제에 대하여 다음 한도가 적용됩니다.\n\n| 구분 | 한도 |\n|------|------|\n| 1회 결제 한도 | 50,000원 |\n| 월 누적 결제 한도 | 300,000원 |\n\n② 치즈(Cheez) 포인트 구매 금액도 위 한도에 포함됩니다.\n\n③ 한도 초과 결제 시도 시 법정대리인 추가 동의를 요구하거나 결제가 제한됩니다.\n\n④ 결제 한도는 관계 법령의 개정 또는 회사 정책 변경에 따라 조정될 수 있으며, 변경 시 사전 공지합니다.\n\n### 3.2 유해 콘텐츠 차단\n\n① 회사는 「청소년 보호법」 제2조 제3호에서 정한 청소년 유해 매체물이 서비스 내에 노출되지 않도록 다음 조치를 취합니다.\n\n1. 성인 인증을 완료한 회원에게만 성인 콘텐츠 접근 허용\n2. 청소년 회원 계정에 대해 유해 콘텐츠 자동 필터링 적용\n3. AI 기반 콘텐츠 모니터링을 통한 부적절한 콘텐츠 감지 및 차단\n\n② 청소년 회원이 유해 콘텐츠를 발견한 경우 앱 내 신고 기능 또는 고객센터를 통해 즉시 신고할 수 있습니다.\n\n③ 청소년에게 유해한 것으로 신고·확인된 콘텐츠는 영업일 기준 24시간 이내에 처리됩니다.\n\n### 3.3 채팅 및 커뮤니케이션 보호\n\n① 청소년 회원은 성인 인증 회원과의 1:1 채팅이 기본적으로 제한될 수 있습니다.\n\n② 채팅 내 욕설, 성희롱, 따돌림 등 청소년에게 유해한 메시지는 필터링됩니다.\n\n③ 청소년 회원이 불쾌한 메시지를 수신한 경우 즉시 차단 및 신고할 수 있습니다.\n\n---\n\n## 제4조 (청소년 대상 마케팅 제한)\n\n### 4.1 금지 마케팅 활동\n\n회사는 청소년 회원을 대상으로 다음 마케팅 활동을 금지합니다.\n\n1. 과도한 소비를 조장하거나 충동구매를 유발하는 광고\n2. 허위·과장 광고 또는 비교 광고를 통해 청소년의 판단을 흐리는 행위\n3. 청소년의 심리적 취약성을 이용한 마케팅\n4. 법정대리인의 동의 없이 청소년에게 직접 연락하는 마케팅\n5. 알코올, 도박, 성인 콘텐츠 등 청소년 유해 상품·서비스와 연계된 마케팅\n\n### 4.2 마케팅 동의\n\n① 청소년 회원에 대한 마케팅(이메일, 푸시 알림 등) 은 법정대리인의 별도 동의를 받아야 합니다.\n\n② 청소년 회원은 언제든지 마케팅 수신 동의를 철회할 수 있으며, 이는 서비스 이용에 영향을 미치지 않습니다.\n\n---\n\n## 제5조 (청소년 개인정보 보호 강화 조치)\n\n### 5.1 최소 수집 원칙\n\n① 회사는 청소년 회원의 개인정보를 서비스 제공에 필수적인 최소한의 범위 내에서만 수집합니다.\n\n② 청소년 회원의 개인정보는 성인 회원과 동등한 수준으로 보호되며, 추가적인 보호 조치가 적용됩니다.\n\n### 5.2 제3자 제공 제한\n\n① 청소년 회원의 개인정보는 관계 법령에서 정한 경우를 제외하고는 제3자에게 제공되지 않습니다.\n\n② 마케팅 목적의 개인정보 제3자 제공은 법정대리인의 동의 없이 이루어지지 않습니다.\n\n### 5.3 행동 데이터 처리\n\n① 청소년 회원의 서비스 이용 행동 데이터(구매 패턴, 콘텐츠 소비 등)는 청소년 보호를 위한 목적으로만 분석됩니다.\n\n② 청소년 회원의 행동 데이터를 기반으로 한 개인화 광고 노출은 최소화합니다.\n\n### 5.4 개인정보 보존 기간\n\n청소년 회원의 개인정보는 서비스 이용 계약이 유효한 기간 동안 보존되며, 탈퇴 또는 법정대리인의 삭제 요청 시 「개인정보 보호법」 및 관계 법령에 따라 처리됩니다.\n\n---\n\n## 제6조 (법정대리인 권리 행사 방법)\n\n### 6.1 법정대리인의 권리\n\n「개인정보 보호법」 제22조의2에 따라 법정대리인은 다음 권리를 행사할 수 있습니다.\n\n1. **열람권**: 청소년 자녀의 개인정보 수집·이용 내역 열람\n2. **정정권**: 부정확한 개인정보의 정정 요청\n3. **삭제권**: 청소년 자녀의 개인정보 삭제 요청\n4. **동의 철회권**: 개인정보 처리에 대한 동의 철회\n5. **처리 정지권**: 특정 목적의 개인정보 처리 정지 요청\n\n### 6.2 권리 행사 방법\n\n① 권리 행사는 다음 방법으로 신청할 수 있습니다.\n\n- **이메일**: hello@fanup.im (제목: 법정대리인 권리 행사 요청)\n- **전화**: 031-8016-5242 (평일 09:00~18:00)\n- **우편**: 서울시 서초구 강남대로 53길 8, 8층 12-1호\n\n② 권리 행사 요청 시 다음 서류를 제출하여야 합니다.\n\n1. 법정대리인 본인 확인 서류 (주민등록증, 여권 등)\n2. 법정대리인 자격 확인 서류 (가족관계증명서 등)\n3. 요청 내용 (열람, 정정, 삭제 등)\n\n### 6.3 처리 기간\n\n권리 행사 요청은 접수일로부터 영업일 기준 **10일 이내**에 처리되며, 처리 결과를 법정대리인에게 통보합니다.\n\n### 6.4 권리 행사 거부 시 불복 절차\n\n① 법정대리인의 권리 행사 요청이 거부된 경우, 거부 사유와 함께 통보됩니다.\n\n② 거부 처분에 이의가 있는 경우 개인정보 보호위원회(privacy.go.kr), 한국인터넷진흥원(118), 또는 관할 법원에 불복 신청이 가능합니다.\n\n---\n\n## 제7조 (청소년보호책임자 지정)\n\n### 7.1 청소년보호책임자\n\n「청소년 보호법」 제35조에 따라 회사는 청소년 보호를 위한 책임자를 다음과 같이 지정합니다.\n\n| 항목 | 내용 |\n|------|------|\n| 직책 | 대표이사 |\n| 성명 | 최상열 |\n| 이메일 | hello@fanup.im |\n| 전화 | 031-8016-5242 |\n\n### 7.2 청소년보호책임자의 업무\n\n청소년보호책임자는 다음 업무를 수행합니다.\n\n1. 청소년 유해 콘텐츠의 유통 방지 및 삭제\n2. 청소년 보호 관련 민원 접수 및 처리\n3. 청소년 보호 정책의 수립 및 이행 점검\n4. 임직원 대상 청소년 보호 교육 시행\n5. 관계 기관(여성가족부, 방송통신심의위원회 등)과의 협력\n\n---\n\n## 제8조 (신고 및 피해 구제)\n\n### 8.1 서비스 내 신고\n\n청소년 유해 콘텐츠, 청소년 대상 부적절한 행위 등을 발견한 경우 다음 방법으로 신고할 수 있습니다.\n\n- **앱 내 신고**: 해당 콘텐츠 또는 사용자 프로필 → 신고 버튼 클릭\n- **이메일**: hello@fanup.im\n- **전화**: 031-8016-5242 (평일 09:00~18:00)\n\n### 8.2 외부 신고 기관\n\n서비스 내 신고 외에도 다음 외부 기관을 통해 신고 및 피해 구제를 받을 수 있습니다.\n\n| 기관 | 연락처 | 담당 업무 |\n|------|--------|-----------|\n| 여성가족부 청소년 보호과 | 02-2100-6000 | 청소년 유해 매체물 신고 |\n| 방송통신심의위원회 | 1377 | 불법·유해 인터넷 정보 신고 |\n| 경찰청 사이버수사국 | 182 | 사이버 범죄 신고 |\n| 한국청소년상담복지개발원 | 1388 | 청소년 피해 상담 |\n| 개인정보 보호위원회 | 182 | 개인정보 침해 신고 |\n\n### 8.3 피해 구제 절차\n\n① 청소년 피해 신고 접수 후 회사는 다음 절차로 처리합니다.\n\n1. 신고 접수 및 담당자 배정 (즉시)\n2. 사실 관계 확인 (영업일 기준 2일 이내)\n3. 해당 콘텐츠·계정 조치 (사실 확인 즉시)\n4. 신고자 및 피해 청소년(법정대리인)에게 처리 결과 통보 (조치일로부터 3일 이내)\n\n② 피해 청소년 또는 법정대리인은 처리 결과에 이의가 있는 경우 고객센터를 통해 재검토를 요청할 수 있습니다.\n\n---\n\n## 제9조 (정책의 변경 및 공지)\n\n① 회사는 관계 법령의 변경 또는 청소년 보호 강화를 위해 본 정책을 변경할 수 있습니다.\n\n② 정책 변경 시 시행일 **7일 전**부터 서비스 내 공지사항을 통해 공지하며, 청소년 회원 및 법정대리인에게는 이메일 또는 앱 내 알림으로 별도 안내합니다.\n\n③ 변경된 정책은 공지된 시행일부터 효력이 발생합니다.\n\n---\n\n**시행일: 2026년 4월 1일**\n\n주식회사 틴로봇 (Tinrobot Inc.)\n대표이사 (청소년보호책임자) 최상열\n";
